aid: frappe
name: Frappe
description: >-
  Frappe is a fully featured, low-code web framework written in Python and
  JavaScript that powers ERPNext, the open-source ERP for accounting,
  inventory, payroll, and operations. The Frappe REST API auto-exposes every
  DocType for CRUD plus whitelisted Python method calls.
