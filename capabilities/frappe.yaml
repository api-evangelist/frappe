naftiko: 1.0.0-alpha2
info:
  label: Frappe Framework REST API
  description: 'Frappe Framework REST API. 10 operations. Lead operation: Get currently logged-in user. Self-contained Naftiko
    capability covering one Frappe business surface.'
  tags:
  - Frappe
  - Frappe Framework REST API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRAPPE_API_KEY: FRAPPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: frappe
    baseUri: https://{site}
    description: Frappe Framework REST API business capability. Self-contained, no shared references.
    resources:
    - name: api-method-frappe.auth.get_logged_user
      path: /api/method/frappe.auth.get_logged_user
      operations:
      - name: getloggeduser
        method: GET
        description: Get currently logged-in user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-method-login
      path: /api/method/login
      operations:
      - name: login
        method: POST
        description: Login with username and password
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-method-upload_file
      path: /api/method/upload_file
      operations:
      - name: uploadfile
        method: POST
        description: Upload a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-method-dotted_path
      path: /api/method/{dotted_path}
      operations:
      - name: callmethodget
        method: GET
        description: Call a whitelisted Python method (read-only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dotted_path
          in: path
          type: string
          required: true
      - name: callmethodpost
        method: POST
        description: Call a whitelisted Python method (state-changing)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dotted_path
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-resource-doctype
      path: /api/resource/{doctype}
      operations:
      - name: listdocuments
        method: GET
        description: List documents of a DocType
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: doctype
          in: path
          type: string
          required: true
        - name: fields
          in: query
          type: string
        - name: filters
          in: query
          type: string
        - name: order_by
          in: query
          type: string
        - name: limit_start
          in: query
          type: integer
        - name: limit_page_length
          in: query
          type: integer
      - name: createdocument
        method: POST
        description: Create a document of a DocType
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: doctype
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-resource-doctype-name
      path: /api/resource/{doctype}/{name}
      operations:
      - name: getdocument
        method: GET
        description: Read a document by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: doctype
          in: path
          type: string
          required: true
        - name: name
          in: path
          type: string
          required: true
      - name: updatedocument
        method: PUT
        description: Update a document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: doctype
          in: path
          type: string
          required: true
        - name: name
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedocument
        method: DELETE
        description: Delete a document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: doctype
          in: path
          type: string
          required: true
        - name: name
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.FRAPPE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: frappe-rest
    port: 8080
    description: REST adapter for Frappe Framework REST API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/method/frappe-auth-get-logged-user
      name: api-method-frappe-auth-get-logged-user
      description: REST surface for api-method-frappe.auth.get_logged_user.
      operations:
      - method: GET
        name: getloggeduser
        description: Get currently logged-in user
        call: frappe.getloggeduser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/method/login
      name: api-method-login
      description: REST surface for api-method-login.
      operations:
      - method: POST
        name: login
        description: Login with username and password
        call: frappe.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/method/upload-file
      name: api-method-upload-file
      description: REST surface for api-method-upload_file.
      operations:
      - method: POST
        name: uploadfile
        description: Upload a file
        call: frappe.uploadfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/method/{dotted-path}
      name: api-method-dotted-path
      description: REST surface for api-method-dotted_path.
      operations:
      - method: GET
        name: callmethodget
        description: Call a whitelisted Python method (read-only)
        call: frappe.callmethodget
        with:
          dotted_path: rest.dotted_path
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: callmethodpost
        description: Call a whitelisted Python method (state-changing)
        call: frappe.callmethodpost
        with:
          dotted_path: rest.dotted_path
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/resource/{doctype}
      name: api-resource-doctype
      description: REST surface for api-resource-doctype.
      operations:
      - method: GET
        name: listdocuments
        description: List documents of a DocType
        call: frappe.listdocuments
        with:
          doctype: rest.doctype
          fields: rest.fields
          filters: rest.filters
          order_by: rest.order_by
          limit_start: rest.limit_start
          limit_page_length: rest.limit_page_length
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdocument
        description: Create a document of a DocType
        call: frappe.createdocument
        with:
          doctype: rest.doctype
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/resource/{doctype}/{name}
      name: api-resource-doctype-name
      description: REST surface for api-resource-doctype-name.
      operations:
      - method: GET
        name: getdocument
        description: Read a document by name
        call: frappe.getdocument
        with:
          doctype: rest.doctype
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatedocument
        description: Update a document
        call: frappe.updatedocument
        with:
          doctype: rest.doctype
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedocument
        description: Delete a document
        call: frappe.deletedocument
        with:
          doctype: rest.doctype
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: frappe-mcp
    port: 9090
    transport: http
    description: MCP adapter for Frappe Framework REST API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-currently-logged-user
      description: Get currently logged-in user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: frappe.getloggeduser
      outputParameters:
      - type: object
        mapping: $.
    - name: login-username-and-password
      description: Login with username and password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: frappe.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file
      description: Upload a file
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: frappe.uploadfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: call-whitelisted-python-method-read
      description: Call a whitelisted Python method (read-only)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: frappe.callmethodget
      with:
        dotted_path: tools.dotted_path
      outputParameters:
      - type: object
        mapping: $.
    - name: call-whitelisted-python-method-state
      description: Call a whitelisted Python method (state-changing)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: frappe.callmethodpost
      with:
        dotted_path: tools.dotted_path
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-documents-doctype
      description: List documents of a DocType
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: frappe.listdocuments
      with:
        doctype: tools.doctype
        fields: tools.fields
        filters: tools.filters
        order_by: tools.order_by
        limit_start: tools.limit_start
        limit_page_length: tools.limit_page_length
      outputParameters:
      - type: object
        mapping: $.
    - name: create-document-doctype
      description: Create a document of a DocType
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: frappe.createdocument
      with:
        doctype: tools.doctype
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-document-name
      description: Read a document by name
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: frappe.getdocument
      with:
        doctype: tools.doctype
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: update-document
      description: Update a document
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: frappe.updatedocument
      with:
        doctype: tools.doctype
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-document
      description: Delete a document
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: frappe.deletedocument
      with:
        doctype: tools.doctype
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
